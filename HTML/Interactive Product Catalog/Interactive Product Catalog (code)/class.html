<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Магазин</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Магазин</h1>

<input type="text" placeholder="Пошук товарів..." class="search">

<nav>
    <a href="#">Електроніка</a>
    <a href="#">Одяг</a>
    <a href="#">Книги</a>
</nav>

<div class="products">
    <div class="card" tabindex="0">
        <h2>Продукт 1</h2>
        <p>Це опис першого продукту. Дуже якісний товар.</p>
        <button>Додати в кошик</button>
    </div>

    <div class="card" tabindex="0">
        <h2>Продукт 2</h2>
        <p>Це опис другого продукту. Популярний вибір.</p>
        <button>Додати в кошик</button>
    </div>

    <div class="card" tabindex="0">
        <h2>Продукт 3</h2>
        <p>Це опис третього продукту. Найкраща ціна.</p>
        <button>Додати в кошик</button>
    </div>
</div>

<h2>Відгуки</h2>
<ul class="reviews">
    <li>Дуже хороший товар!</li>
    <li>Мені сподобалося.</li>
    <li>Міг би бути кращим.</li>
    <li>Рекомендую!</li>
</ul>

</body>
</html>
