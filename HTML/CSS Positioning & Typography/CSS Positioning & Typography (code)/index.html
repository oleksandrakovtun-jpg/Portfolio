<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Position + Fonts</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Приклад position + шрифти</h1>

<div class="block static">Static</div>

<div class="block relative">Relative</div>

<div class="parent">
    <div class="block absolute">Absolute</div>
</div>

<div class="block fixed">Fixed</div>

<p class="custom-font">
    Це текст з локальним шрифтом (@font-face)
</p>

</body>
</html>
